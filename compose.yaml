services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile

    container_name: deepfakeshield-backend

    working_dir: /app

    ports:
      - "8000:8000"

    volumes:
      - ./Backend:/app
      - huggingface-cache:/root/.cache/huggingface

    env_file:
      - .env

    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

    restart: unless-stopped

volumes:
  huggingface-cache: